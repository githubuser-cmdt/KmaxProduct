<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KmaxRush - Admin Panel</title>
    <style>
        :root {
            --yt-red: #ff0000;
            --yt-bg: #0f0f0f;
            --yt-surface: #1a1a1a;
            --yt-surface2: #222222;
            --yt-text: #ffffff;
            --yt-text-secondary: #aaaaaa;
            --yt-border: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--yt-bg); color: var(--yt-text); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .header { background: var(--yt-surface); border-bottom: 3px solid var(--yt-red); padding: 15px 0; margin-bottom: 20px; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .btn { padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--yt-red); color: #fff; }
        .btn-visitor { background: transparent; border: 2px solid var(--yt-border); color: #fff; text-decoration: none; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .product-card { background: var(--yt-surface); border-radius: 12px; padding: 15px; border: 1px solid var(--yt-border); }
        .product-card h3 { margin-bottom: 5px; }
        .product-card .price { font-size: 18px; font-weight: bold; color: var(--yt-red); }
        .product-card a { color: #fff; background: var(--yt-red); padding: 6px 12px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 5px; }
        .product-card button { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 4px 10px; border-radius: 5px; margin-left: 5px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; }
        .modal input, .modal select, .modal textarea { width: 100%; margin: 8px 0; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .modal button { margin-top: 10px; }
        #message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; padding: 10px 20px; border-radius: 20px; z-index: 2000; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo">⚡ KmaxRush Admin</div>
            <div>
                <a href="index.html" class="btn btn-visitor">👀 Public Site</a>
                <button class="btn btn-add" onclick="openAddModal()">＋ Add Product</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Add Product</h2>
            <form id="productForm">
                <input type="hidden" id="prodId">
                <input type="text" id="prodName" placeholder="Product Name *" required>
                <input type="text" id="prodPrice" placeholder="Price (e.g. $49.99)">
                <input type="text" id="prodLink" placeholder="Buy Link *" required>
                <select id="prodCategory">
                    <option value="tech">💻 Tech</option>
                    <option value="gaming">🎮 Gaming</option>
                    <option value="accessories">🎧 Accessories</option>
                    <option value="lifestyle">🌟 Lifestyle</option>
                    <option value="other">📦 Other</option>
                </select>
                <textarea id="prodDesc" placeholder="Description" rows="3"></textarea>
                <input type="text" id="prodImage" placeholder="Image URL (optional)">
                <button type="submit" style="background:#4caf50; color:#fff;">💾 Save</button>
                <button type="button" onclick="closeModal()" style="background:#555;">Cancel</button>
            </form>
        </div>
    </div>
    <div id="message"></div>

    <script>
        const STORAGE_KEY = 'kmaxrush_products';
        let products = [];
        let editingId = null;

        // Helper to show temporary message
        function msg(text, isError = false) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.style.background = isError ? '#b71c1c' : '#2e7d32';
            setTimeout(() => el.textContent = '', 2500);
        }

        // Load from storage
        function load() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                products = data ? JSON.parse(data) : [];
            } catch (e) {
                products = [];
                msg('Error loading data!', true);
            }
        }

        // Save to storage
        function save() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                return true;
            } catch (e) {
                msg('Save failed!', true);
                return false;
            }
        }

        // Render grid
        function render() {
            const grid = document.getElementById('productGrid');
            if (!products.length) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#aaa;">No products. Click "Add Product" to start.</p>';
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    ${p.price ? `<div class="price">${p.price}</div>` : ''}
                    ${p.description ? `<p>${p.description}</p>` : ''}
                    <a href="${p.link}" target="_blank">🛒 Buy</a>
                    <button onclick="editProduct('${p.id}')">✏️</button>
                    <button onclick="deleteProduct('${p.id}')">🗑️</button>
                </div>
            `).join('');
        }

        // Modal open
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('prodId').value = p.id;
            document.getElementById('prodName').value = p.name || '';
            document.getElementById('prodPrice').value = p.price || '';
            document.getElementById('prodLink').value = p.link || '';
            document.getElementById('prodCategory').value = p.category || 'tech';
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodImage').value = p.image || '';
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            products = products.filter(x => x.id !== id);
            if (save()) render();
        }

        // Form submit
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('prodName').value.trim();
            const link = document.getElementById('prodLink').value.trim();
            if (!name || !link) {
                msg('Name and link are required!', true);
                return;
            }
            const data = {
                id: editingId || Date.now().toString(),
                name,
                price: document.getElementById('prodPrice').value.trim(),
                link,
                category: document.getElementById('prodCategory').value,
                description: document.getElementById('prodDesc').value.trim(),
                image: document.getElementById('prodImage').value.trim(),
                createdAt: editingId ? (products.find(p => p.id === editingId)?.createdAt || Date.now()) : Date.now(),
                updatedAt: Date.now()
            };
            if (editingId) {
                const idx = products.findIndex(p => p.id === editingId);
                if (idx >= 0) products[idx] = data;
            } else {
                products.unshift(data);
            }
            if (save()) {
                closeModal();
                render();
                msg(editingId ? 'Product updated!' : 'Product added!');
            }
        });

        // Close modal on outside click
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Init
        load();
        render();
        console.log('Admin ready. Storage:', localStorage.getItem(STORAGE_KEY));
    </script>
</body>
</html>
