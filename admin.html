<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KmaxRush - Admin Panel</title>
    <style>
        :root {
            --yt-red: #ff0000;
            --yt-bg: #0f0f0f;
            --yt-surface: #1a1a1a;
            --yt-surface2: #222222;
            --yt-surface3: #2a2a2a;
            --yt-text: #ffffff;
            --yt-text-secondary: #aaaaaa;
            --yt-border: #333333;
            --card-radius: 16px;
            --btn-radius: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Inter', sans-serif; background: var(--yt-bg); color: var(--yt-text); min-height: 100vh; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .header {
            background: var(--yt-surface); border-bottom: 3px solid var(--yt-red);
            padding: 16px 0; position: sticky; top: 0; z-index: 100;
        }
        .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width:48px; height:48px; background:var(--yt-red); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; color:#fff; }
        .logo-text h1 { font-size:1.6rem; font-weight:800; }
        .logo-text .subtitle { font-size:0.8rem; color:var(--yt-text-secondary); }
        .header-actions { display:flex; gap:12px; flex-wrap:wrap; }
        .btn {
            padding: 10px 20px; border-radius: var(--btn-radius); border: none; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: all 0.3s; font-family: inherit;
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .btn-add { background: var(--yt-red); color: #fff; }
        .btn-visitor { background: transparent; border: 2px solid var(--yt-border); color: #fff; }
        .btn-visitor:hover { border-color: var(--yt-red); color: var(--yt-red); }
        .search-section { margin: 24px 0; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .search-input-wrap { flex:1; min-width:250px; position:relative; }
        .search-input-wrap svg { position:absolute; left:16px; top:50%; transform:translateY(-50%); width:20px; height:20px; color:var(--yt-text-secondary); }
        .search-input { width:100%; padding:14px 20px 14px 48px; border-radius:30px; border:2px solid var(--yt-border); background:var(--yt-surface2); color:#fff; font-size:1rem; outline:none; }
        .search-input:focus { border-color:var(--yt-red); }
        .category-filter { padding:12px 20px; border-radius:30px; border:2px solid var(--yt-border); background:var(--yt-surface2); color:#fff; cursor:pointer; }
        .product-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin:24px 0 40px; }
        .product-card {
            background:var(--yt-surface); border-radius:var(--card-radius); overflow:hidden;
            border:1px solid var(--yt-border); transition:all 0.35s; display:flex; flex-direction:column;
        }
        .product-card:hover { border-color:var(--yt-red); transform:translateY(-6px); }
        .card-img-wrap { position:relative; width:100%; height:200px; background:var(--yt-surface2); overflow:hidden; }
        .card-img-wrap img { width:100%; height:100%; object-fit:cover; }
        .card-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1a1a,#2a1a1a); font-size:3rem; color:#444; }
        .card-category-tag { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.75); color:#fff; padding:5px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .card-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:8px; }
        .card-body h3 { font-size:1.1rem; font-weight:700; }
        .card-body .desc { color:var(--yt-text-secondary); font-size:0.85rem; }
        .card-body .price { font-size:1.4rem; font-weight:800; }
        .card-actions { display:flex; gap:8px; padding:0 16px 16px; flex-wrap:wrap; }
        .btn-buy { flex:1; background:var(--yt-red); color:#fff; text-decoration:none; padding:10px 16px; border-radius:var(--btn-radius); text-align:center; font-weight:700; }
        .btn-edit { background:transparent; border:1px solid #ffaa00; color:#ffaa00; padding:6px 14px; border-radius:20px; cursor:pointer; }
        .btn-edit:hover { background:#ffaa00; color:#000; }
        .btn-delete { background:transparent; border:1px solid #ff4444; color:#ff4444; padding:6px 14px; border-radius:20px; cursor:pointer; }
        .btn-delete:hover { background:#ff4444; color:#fff; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; display:none; align-items:center; justify-content:center; }
        .modal { background:var(--yt-surface); border-radius:20px; padding:28px; width:100%; max-width:550px; border:1px solid var(--yt-border); max-height:85vh; overflow-y:auto; }
        .modal h2 { margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; margin-bottom:6px; font-weight:600; font-size:0.85rem; color:var(--yt-text-secondary); text-transform:uppercase; }
        .form-group input, .form-group textarea, .form-group select {
            width:100%; padding:12px 16px; border-radius:12px; border:2px solid var(--yt-border);
            background:var(--yt-surface2); color:#fff; font-size:0.95rem; outline:none; resize:vertical;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--yt-red); }
        .form-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
        .btn-save { background:#4caf50; color:#fff; }
        .btn-cancel { background:var(--yt-surface3); color:#fff; }
        .toast {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#333;
            color:#fff; padding:12px 24px; border-radius:30px; font-weight:600; z-index:2000;
            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards;
        }
        .toast.success { background:#2e7d32; }
        .toast.error { background:#b71c1c; }
        @keyframes toastIn { from{opacity:0; transform:translateX(-50%) translateY(80px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0; transform:translateX(-50%) translateY(30px);} }
        .footer { text-align:center; padding:24px; color:var(--yt-text-secondary); border-top:1px solid var(--yt-border); margin-top:20px; }
        .footer a { color:var(--yt-red); text-decoration:none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo-area">
                <div class="logo-icon">KR</div>
                <div class="logo-text">
                    <h1>KmaxRush</h1>
                    <span class="subtitle">🔧 Admin Panel</span>
                </div>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn btn-visitor">👀 View Public Site</a>
                <button class="btn btn-add" onclick="openAddModal()">＋ Add Product</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="search-section">
            <div class="search-input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="renderProducts()">
            </div>
            <select class="category-filter" id="categoryFilter" onchange="renderProducts()">
                <option value="all">📂 All Categories</option>
                <option value="tech">💻 Tech & Gadgets</option>
                <option value="lifestyle">🌟 Lifestyle</option>
                <option value="gaming">🎮 Gaming</option>
                <option value="accessories">🎧 Accessories</option>
                <option value="other">📦 Other</option>
            </select>
            <span id="productCount" style="color:#aaa;">0 products</span>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </main>

    <!-- Modal for Add/Edit -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">➕ Add Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group"><label>Product Name *</label><input type="text" id="prodName" required></div>
                <div class="form-group"><label>Description</label><textarea id="prodDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Price</label><input type="text" id="prodPrice" placeholder="e.g. $49.99"></div>
                <div class="form-group"><label>Image URL</label><input type="url" id="prodImage"></div>
                <div class="form-group"><label>Buy Link *</label><input type="url" id="prodLink" required></div>
                <div class="form-group"><label>Category</label>
                    <select id="prodCategory">
                        <option value="tech">💻 Tech & Gadgets</option>
                        <option value="lifestyle">🌟 Lifestyle</option>
                        <option value="gaming">🎮 Gaming</option>
                        <option value="accessories">🎧 Accessories</option>
                        <option value="other">📦 Other</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-save">💾 Save</button>
                </div>
            </form>
        </div>
    </div>
    <div id="toastContainer"></div>
    <footer class="footer">
        <p>© <span id="currentYear"></span> KmaxRush Admin</p>
    </footer>

    <script>
        const STORAGE_KEY = 'kmaxrush_products';
        let products = [];
        let editingId = null;

        // Load products from localStorage
        function loadProducts() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                console.log('Loading products from localStorage:', stored);
                products = stored ? JSON.parse(stored) : [];
            } catch (e) {
                console.error('Failed to parse products:', e);
                products = [];
            }
            console.log('Products loaded:', products);
        }

        // Save products to localStorage
        function saveProducts() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                console.log('Saved products to localStorage:', products);
            } catch (e) {
                console.error('Failed to save products:', e);
                showToast('Error saving data. Is localStorage full or blocked?', 'error');
            }
        }

        // Render the product grid
        function renderProducts() {
            console.log('Rendering products...');
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;

            let filtered = products.filter(p => {
                const matchSearch = !search || p.name.toLowerCase().includes(search) || (p.description && p.description.toLowerCase().includes(search));
                const matchCat = cat === 'all' || p.category === cat;
                return matchSearch && matchCat;
            });
            filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            document.getElementById('productCount').textContent = filtered.length + ' product(s)';

            if (!filtered.length) {
                grid.innerHTML = `<div style="text-align:center; padding:60px; grid-column:1/-1; color:#aaa;">No products found. Add your first product!</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const catEmoji = { tech:'💻', lifestyle:'🌟', gaming:'🎮', accessories:'🎧', other:'📦' }[p.category] || '📦';
                // Use a simple placeholder if no image
                const imgHTML = p.image
                    ? `<img src="${escapeHTML(p.image)}" alt="${escapeHTML(p.name)}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'card-img-placeholder\\'>📷</div>'">`
                    : `<div class="card-img-placeholder">📷</div>`;
                return `
                <div class="product-card">
                    <div class="card-img-wrap">${imgHTML}<span class="card-category-tag">${catEmoji} ${p.category || 'Other'}</span></div>
                    <div class="card-body">
                        <h3>${escapeHTML(p.name)}</h3>
                        ${p.description ? `<p class="desc">${escapeHTML(p.description)}</p>` : ''}
                        ${p.price ? `<div class="price">${escapeHTML(p.price)}</div>` : ''}
                    </div>
                    <div class="card-actions">
                        <a href="${escapeHTML(p.link)}" target="_blank" class="btn-buy">🛒 Buy</a>
                        <button class="btn-edit" onclick="openEditModal('${p.id}')">✏️</button>
                        <button class="btn-delete" onclick="deleteProduct('${p.id}')">🗑️</button>
                    </div>
                </div>`;
            }).join('');
        }

        // Open modal for adding
        function openAddModal() {
            console.log('Opening add modal');
            editingId = null;
            document.getElementById('modalTitle').textContent = '➕ Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        // Open modal for editing
        function openEditModal(id) {
            console.log('Opening edit modal for', id);
            const p = products.find(prod => prod.id === id);
            if (!p) {
                showToast('Product not found', 'error');
                return;
            }
            editingId = id;
            document.getElementById('modalTitle').textContent = '✏️ Edit Product';
            document.getElementById('productId').value = p.id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodPrice').value = p.price || '';
            document.getElementById('prodImage').value = p.image || '';
            document.getElementById('prodLink').value = p.link;
            document.getElementById('prodCategory').value = p.category || 'tech';
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        // Close modal
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // Handle form submission
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('Form submitted');

            const name = document.getElementById('prodName').value.trim();
            const link = document.getElementById('prodLink').value.trim();

            if (!name || !link) {
                showToast('Product name and buy link are required.', 'error');
                return;
            }

            const productData = {
                id: editingId || 'prod_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                name: name,
                description: document.getElementById('prodDesc').value.trim(),
                price: document.getElementById('prodPrice').value.trim(),
                image: document.getElementById('prodImage').value.trim(),
                link: link,
                category: document.getElementById('prodCategory').value,
                createdAt: editingId ? (products.find(p => p.id === editingId)?.createdAt || Date.now()) : Date.now(),
                updatedAt: Date.now()
            };

            console.log('Product data to save:', productData);

            if (editingId) {
                const index = products.findIndex(p => p.id === editingId);
                if (index >= 0) {
                    products[index] = productData;
                    showToast('✅ Product updated!', 'success');
                } else {
                    showToast('Error: product not found for editing.', 'error');
                    return;
                }
            } else {
                products.unshift(productData);
                showToast('🎉 Product added!', 'success');
            }

            saveProducts();
            closeModal();
            renderProducts();
        });

        // Delete product
        function deleteProduct(id) {
            const p = products.find(prod => prod.id === id);
            if (p && confirm(`Delete "${p.name}"?`)) {
                products = products.filter(prod => prod.id !== id);
                saveProducts();
                renderProducts();
                showToast('🗑️ Product deleted.', 'error');
            }
        }

        // Toast messages
        function showToast(message, type) {
            console.log('Toast:', message);
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type || '');
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 3000);
        }

        // Simple escape
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Close modal if clicking outside of it
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        window.addEventListener('load', () => {
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            loadProducts();
            renderProducts();
            console.log('Admin panel ready. Products count:', products.length);
        });
    </script>
</body>
</html>
