<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KmaxRush - Products</title>
    <style>
        :root {
            --yt-red: #ff0000;
            --yt-bg: #0f0f0f;
            --yt-surface: #1a1a1a;
            --yt-text: #ffffff;
            --yt-text-secondary: #aaaaaa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--yt-bg); color: var(--yt-text); margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .header { background: var(--yt-surface); border-bottom: 3px solid var(--yt-red); padding: 15px 0; margin-bottom: 20px; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .product-card { background: var(--yt-surface); border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .product-card h3 { margin-bottom: 5px; }
        .product-card .price { font-size: 18px; font-weight: bold; color: var(--yt-red); }
        .product-card a { color: #fff; background: var(--yt-red); padding: 6px 12px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 5px; }
        .empty { text-align: center; color: #aaa; padding: 50px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo">⚡ KmaxRush</div>
            <a href="https://youtube.com/@kmaxrush" target="_blank" style="color:#fff; text-decoration:none; background:#222; padding:8px 16px; border-radius:20px;">📺 YouTube</a>
        </div>
    </header>

    <div class="container">
        <div class="product-grid" id="productGrid"></div>
    </div>

    <script>
        const STORAGE_KEY = 'kmaxrush_products';
        const products = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const grid = document.getElementById('productGrid');
        if (!products.length) {
            grid.innerHTML = '<div class="empty">🛍️ No products listed yet. Check back soon!</div>';
        } else {
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    ${p.price ? `<div class="price">${p.price}</div>` : ''}
                    ${p.description ? `<p>${p.description}</p>` : ''}
                    <a href="${p.link}" target="_blank">🛒 Buy Now</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
