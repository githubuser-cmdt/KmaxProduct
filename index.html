<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KmaxRush - Products</title>
<style>
        :root {
            --yt-red: #ff0000;
            --yt-bg: #0f0f0f;
            --yt-surface: #1a1a1a;
            --yt-surface2: #222222;
            --yt-text: #ffffff;
            --yt-text-secondary: #aaaaaa;
            --yt-border: #333333;
            --card-radius: 16px;
            --btn-radius: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background: var(--yt-bg);
            color: var(--yt-text);
            min-height: 100vh;
            line-height: 1.5;
        }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .header {
            background: var(--yt-surface);
            border-bottom: 3px solid var(--yt-red);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }
        .header-inner {
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 48px; height: 48px; background: var(--yt-red); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; color: #fff;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        .logo-text h1 { font-size: 1.6rem; font-weight: 800; }
        .logo-text .subtitle { font-size: 0.8rem; color: var(--yt-text-secondary); }
        .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .yt-link {
            display: flex; align-items: center; gap: 8px;
            background: var(--yt-surface2); color: #fff; text-decoration: none;
            padding: 10px 18px; border-radius: var(--btn-radius);
            font-weight: 600; font-size: 0.9rem; transition: all 0.3s;
        }
        .yt-link:hover { background: var(--yt-red); box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .search-section { margin: 24px 0; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .search-input-wrap { flex: 1; min-width: 250px; position: relative; }
        .search-input-wrap svg {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; color: var(--yt-text-secondary);
        }
        .search-input {
            width: 100%; padding: 14px 20px 14px 48px; border-radius: 30px;
            border: 2px solid var(--yt-border); background: var(--yt-surface2);
            color: #fff; font-size: 1rem; outline: none;
        }
        .search-input:focus { border-color: var(--yt-red); }
        .category-filter {
            padding: 12px 20px; border-radius: 30px; border: 2px solid var(--yt-border);
            background: var(--yt-surface2); color: #fff; font-size: 0.9rem; cursor: pointer; outline: none;
        }
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin: 24px 0 40px;
        }
        .product-card {
            background: var(--yt-surface); border-radius: var(--card-radius);
            overflow: hidden; border: 1px solid var(--yt-border);
            transition: all 0.35s; display: flex; flex-direction: column;
        }
        .product-card:hover { border-color: var(--yt-red); transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .card-img-wrap { position: relative; width: 100%; height: 200px; background: var(--yt-surface2); overflow: hidden; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .product-card:hover .card-img-wrap img { transform: scale(1.06); }
        .card-img-placeholder {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a1a, #2a1a1a); font-size: 3rem; color: #444;
        }
        .card-category-tag {
            position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.75);
            color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .card-body h3 { font-size: 1.1rem; font-weight: 700; }
        .card-body .desc { color: var(--yt-text-secondary); font-size: 0.85rem; }
        .card-body .price { font-size: 1.4rem; font-weight: 800; }
        .btn-buy {
            flex: 1; background: var(--yt-red); color: #fff; text-decoration: none;
            padding: 10px 16px; border-radius: var(--btn-radius); text-align: center;
            font-weight: 700; transition: all 0.3s; display: inline-block;
        }
        .btn-buy:hover { background: #ff2222; box-shadow: 0 6px 20px rgba(255,0,0,0.4); }
        .card-actions { display: flex; gap: 8px; padding: 0 16px 16px; }
        .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; }
        .empty-state .icon { font-size: 5rem; opacity: 0.5; }
        .footer { text-align: center; padding: 24px; color: var(--yt-text-secondary); border-top: 1px solid var(--yt-border); margin-top: 20px; }
        .footer a { color: var(--yt-red); text-decoration: none; font-weight: 600; }
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }
</style>
  </head>
  <body>
    <header class="header">
	  <div class="container header-inner">
		<div class="logo-area">
		  <div class="logo-icon">KR</div>
		  <div class="logo-text">
			<h1>KmaxRush</h1>
			<span class="subtitle">🎬 YouTube Creator • Product Picks</span>
		  </div>
		</div>
		<div class="header-actions">
		  <a href="https://youtube.com/@kmaxrush" target="_blank" class="yt-link">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
			YouTube
		  </a>
		  <!-- Admin link removed – this is a visitor-only page -->
		</div>
	  </div>
    </header>

    <main class="container">
	  <div class="search-section">
		<div class="search-input-wrap">
		  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
		  <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="renderProducts()">
		</div>
		<select class="category-filter" id="categoryFilter" onchange="renderProducts()">
		  <option value="all">📂 All Categories</option>
		  <option value="tech">💻 Tech & Gadgets</option>
		  <option value="lifestyle">🌟 Lifestyle</option>
		  <option value="gaming">🎮 Gaming</option>
		  <option value="accessories">🎧 Accessories</option>
		  <option value="other">📦 Other</option>
		</select>
		<span id="productCount" style="color: #aaa; font-size:0.85rem;">0 products</span>
	  </div>
	  <div class="product-grid" id="productGrid"></div>
    </main>

    <footer class="footer">
	  <p>© <span id="currentYear"></span> <a href="https://youtube.com/@kmaxrush">KmaxRush</a> — Products I recommend.</p>
    </footer>

<script>
        const STORAGE_KEY = 'kmaxrush_products';
        let products = [];

        function loadProducts() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { products = JSON.parse(stored); } catch(e) { products = []; }
            }
            if (products.length === 0) {
                // demo products if empty
                products = [
                    { id:'demo1', name:'Wireless Earbuds', description:'Noise cancelling, great sound.', price:'$79.99', image:'https://images.unsplash.com/photo-1590658268037-6bf12f032f4a?w=400&h=250&fit=crop', link:'#', category:'accessories', createdAt: Date.now() },
                    { id:'demo2', name:'Mechanical Keyboard', description:'RGB backlit, clicky switches.', price:'$129.99', image:'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&h=250&fit=crop', link:'#', category:'gaming', createdAt: Date.now()-1000 },
                    { id:'demo3', name:'4K Webcam', description:'Auto-focus and ring light.', price:'$149.99', image:'https://images.unsplash.com/photo-1587826080692-f439cd0b70da?w=400&h=250&fit=crop', link:'#', category:'tech', createdAt: Date.now()-2000 }
                ];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            let filtered = products.filter(p => {
                const matchSearch = !search || p.name.toLowerCase().includes(search) || (p.description && p.description.toLowerCase().includes(search));
                const matchCat = cat === 'all' || p.category === cat;
                return matchSearch && matchCat;
            });
            filtered.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
            document.getElementById('productCount').textContent = filtered.length + ' product(s)';

            if (!filtered.length) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📦</div><h3>No products found</h3></div>`;
                return;
            }
            grid.innerHTML = filtered.map(p => {
                const img = p.image ? `<img src="${escapeHTML(p.image)}" alt="${escapeHTML(p.name)}" onerror="this.parentElement.innerHTML='<div class=\\'card-img-placeholder\\'>📷</div>'">` : `<div class="card-img-placeholder">📷</div>`;
                const catEmoji = { tech:'💻', lifestyle:'🌟', gaming:'🎮', accessories:'🎧', other:'📦' }[p.category] || '📦';
                return `
                <div class="product-card">
                    <div class="card-img-wrap">
                        ${img}
                        <span class="card-category-tag">${catEmoji} ${p.category || 'Other'}</span>
                    </div>
                    <div class="card-body">
                        <h3>${escapeHTML(p.name)}</h3>
                        ${p.description ? `<p class="desc">${escapeHTML(p.description)}</p>` : ''}
                        ${p.price ? `<div class="price">${escapeHTML(p.price)}</div>` : ''}
                    </div>
                    <div class="card-actions">
                        <a href="${escapeHTML(p.link)}" target="_blank" class="btn-buy">🛒 Buy Now</a>
                    </div>
                </div>`;
            }).join('');
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.onload = () => {
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            loadProducts();
            renderProducts();
        };
</script>
  </body>
</html>
